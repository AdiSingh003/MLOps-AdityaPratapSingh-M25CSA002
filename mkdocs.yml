site_name: MLOpsAditya
site_description: Multi-branch documentation viewer
site_author: Aditya Pratap Singh

theme:
  name: material

  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.instant
    - content.code.copy
    - content.tabs.link
    - search.suggest
    - search.highlight

  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Dark mode

    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Light mode

extra_css:
  - stylesheets/extra.css

nav:
  - Home: index.md
  - Assignments:
      - Assignment 1: branches/assg_1.md
      - Assignment 2: branches/assg_2.md
      - Assignment 3: branches/assg_3.md
      - Assignment 4: branches/assg_4.md
      - Assignment 5: branches/assg_5.md
  - Worksheet:
      - Worksheet 1: branches/worksheet1.md

plugins:
  - search

markdown_extensions:
  - attr_list
  - md_in_html
  - admonition
  - codehilite
  - toc:
      permalink: true
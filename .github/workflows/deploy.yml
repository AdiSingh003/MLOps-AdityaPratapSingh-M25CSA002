name: Deploy Docs

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout main
      uses: actions/checkout@v4

    - name: Setup Git
      run: |
        git config --global user.name "github-actions"
        git config --global user.email "actions@github.com"

    - name: Fetch all branches
      run: git fetch --all

    - name: Create docs folder
      run: mkdir -p docs/branches

    - name: Extract READMEs
      run: |
        branches=$(git branch -r | grep -v HEAD | sed 's/origin\///')

        for branch in $branches
        do
          if [ "$branch" != "main" ] && [ "$branch" != "gh-pages" ]; then
            echo "Processing $branch"
            git show origin/$branch:README.md > docs/branches/$branch.md \
            || echo "# No README in $branch" > docs/branches/$branch.md
          fi
        done

    - name: Install dependencies
      run: pip install -r requirements.txt

    - name: Deploy
      run: mkdocs gh-deploy --force
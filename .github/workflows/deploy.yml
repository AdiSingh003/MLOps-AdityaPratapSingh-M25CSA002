name: Deploy MkDocs to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.x

      - name: Install dependencies
        run: |
          pip install mkdocs-material

      - name: Fetch all branches
        run: git fetch --all

      - name: Generate branch docs
        run: |
          mkdir -p docs/branches

          branches=("assg_1" "assg_2" "assg_3" "assg_4" "assg_5" "worksheet1")

          for branch in "${branches[@]}"
          do
            echo "Processing $branch"

            if git ls-remote --exit-code --heads origin $branch; then
              git show origin/$branch:README.md > docs/branches/$branch.md \
              || echo "# No README found in $branch" > docs/branches/$branch.md
            else
              echo "# Branch $branch not found" > docs/branches/$branch.md
            fi

            # Add header
            sed -i "1i # ${branch}\n\n> Auto-generated from branch: ${branch}\n\n---\n" docs/branches/$branch.md
          done

      - name: Deploy to GitHub Pages
        run: |
          mkdocs gh-deploy --force